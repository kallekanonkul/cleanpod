<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>CleanPod</title>
    <style>
        :root {
            --bg: #f2f2f7;
            --surface: #ffffff;
            --surface2: #f9f9f9;
            --border: #e5e5ea;
            --accent: #007aff;
            --accent-dark: #0062cc;
            --text: #000000;
            --muted: #8e8e93;
            --success: #34c759;
            --error: #ff3b30;
            --warning: #ff9500;
            --radius: 12px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        .header {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0 20px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 17px;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
        }
        .header-logo .icon {
            width: 30px;
            height: 30px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .header-actions a {
            color: var(--accent);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
        }
        .header-user {
            font-size: 13px;
            color: var(--muted);
        }
        .container {
            max-width: 540px;
            margin: 0 auto;
            padding: 20px 16px;
        }
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            margin-bottom: 12px;
            overflow: hidden;
        }
        .card-header {
            padding: 16px 20px 0;
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .card-body {
            padding: 12px 20px 20px;
        }
        .card-body h2 {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 14px;
        }
        input[type="text"],
        input[type="password"],
        input[type="url"],
        input[type="email"] {
            width: 100%;
            padding: 13px 16px;
            border: none;
            border-bottom: 1px solid var(--border);
            background: transparent;
            font-size: 16px;
            color: var(--text);
            outline: none;
            -webkit-appearance: none;
        }
        input:last-of-type { border-bottom: none; }
        input::placeholder { color: var(--muted); }
        .input-group {
            background: var(--surface);
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border);
            margin-bottom: 12px;
        }
        .input-group input { border-bottom: 1px solid var(--border); }
        .input-group input:last-child { border-bottom: none; }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            border-radius: var(--radius);
            font-size: 16px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            margin-bottom: 8px;
            -webkit-appearance: none;
            transition: opacity 0.15s;
        }
        .btn:active { opacity: 0.7; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: var(--border); color: var(--text); }
        .btn-danger { background: var(--error); color: white; }
        .btn-small {
            padding: 7px 14px;
            font-size: 14px;
            border-radius: 8px;
            width: auto;
            display: inline-block;
            margin: 0;
        }
        .alert {
            padding: 12px 16px;
            border-radius: var(--radius);
            margin-bottom: 12px;
            font-size: 14px;
            font-weight: 500;
        }
        .alert-error { background: #fff2f2; color: var(--error); }
        .alert-success { background: #f0fdf4; color: #166534; }
        .status-box {
            padding: 14px 16px;
            border-radius: var(--radius);
            background: var(--surface2);
            font-size: 14px;
            white-space: pre-wrap;
            min-height: 60px;
            line-height: 1.5;
        }
        .status-running { background: #fff8e6; color: #92400e; }
        .status-done { background: #f0fdf4; color: #166534; }
        .status-error { background: #fff2f2; color: var(--error); }
        .list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 13px 20px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.1s;
        }
        .list-item:last-child { border-bottom: none; }
        .list-item:active { background: var(--bg); }
        .list-item.selected { background: #e8f0fe; }
        .list-item-left { flex: 1; min-width: 0; }
        .list-item-title {
            font-size: 15px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .list-item-subtitle {
            font-size: 12px;
            color: var(--muted);
            margin-top: 2px;
        }
        .list-item-right {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-left: 12px;
            flex-shrink: 0;
        }
        .chevron {
            color: var(--muted);
            font-size: 14px;
        }
        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge-blue { background: #e8f0fe; color: var(--accent); }
        .badge-green { background: #f0fdf4; color: #166534; }
        .badge-gray { background: var(--border); color: var(--muted); }
        .tab-bar {
            display: flex;
            background: var(--surface);
            border-radius: var(--radius);
            padding: 3px;
            margin-bottom: 12px;
            gap: 2px;
        }
        .tab {
            flex: 1;
            padding: 8px 4px;
            text-align: center;
            border-radius: 9px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            color: var(--muted);
            border: none;
            background: none;
            transition: all 0.2s;
        }
        .tab.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 2px 8px rgba(0,122,255,0.3);
        }
        .empty {
            text-align: center;
            color: var(--muted);
            padding: 32px 20px;
            font-size: 15px;
            line-height: 1.5;
        }
        .empty-icon { font-size: 40px; margin-bottom: 8px; }
        .section-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 0 4px;
            margin: 20px 0 6px;
        }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .feed-url {
            font-family: "SF Mono", monospace;
            font-size: 12px;
            background: var(--bg);
            padding: 12px 16px;
            border-radius: 10px;
            word-break: break-all;
            color: var(--accent);
            margin-bottom: 12px;
            border: 1px solid var(--border);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --surface: #1c1c1e;
                --surface2: #2c2c2e;
                --border: #3a3a3c;
                --text: #ffffff;
                --muted: #8e8e93;
            }
            .header { background: rgba(28,28,30,0.85); }
            .list-item.selected { background: #1a2a4a; }
            input { color: white; }
            .tab.active { box-shadow: 0 2px 8px rgba(0,122,255,0.4); }
        }
    </style>
</head>
<body>
<div class="header">
    <a href="/" class="header-logo">
        <div class="icon">🎙</div>
        CleanPod
    </a>
    <div class="header-actions">
        {% if session.username %}
            <span class="header-user">{{ session.username }}</span>
            {% if session.username == 'admin' %}
                <a href="/admin">Admin</a>
            {% endif %}
            <a href="/settings">⚙️</a>
            <a href="/logout">Logga ut</a>
        {% endif %}
    </div>
</div>
<div class="container">
    {% block content %}{% endblock %}
</div>
</body>
</html>
