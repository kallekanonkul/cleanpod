<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
    <title>CleanPod</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CleanPod">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <meta name="theme-color" content="#0d0d0d">
    <style>
        :root {
            --bg:         #0d0d0d;
            --surface:    #1a1a1a;
            --surface2:   #242424;
            --surface3:   #2e2e2e;
            --border:     #2e2e2e;
            --accent:     #7B5EA7;
            --accent2:    #9B7EC8;
            --cyan:       #00C2B2;
            --text:       #ffffff;
            --text2:      #b0b0b0;
            --muted:      #666666;
            --success:    #30d158;
            --error:      #ff453a;
            --radius:     14px;
            --radius-lg:  20px;
            --nav-height: 82px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        html { background: var(--bg); }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            padding-bottom: calc(var(--nav-height) + 70px + var(--safe-bottom));
            overflow-x: hidden;
        }

        /* ── Top header ── */
        .top-header {
            padding: 16px 20px 8px;
            padding-top: calc(16px + env(safe-area-inset-top, 0px));
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .top-header h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .top-header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .avatar {
            width: 36px;
            height: 36px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: white;
            text-decoration: none;
        }
        .icon-btn {
            width: 36px;
            height: 36px;
            background: var(--surface2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
            color: var(--text);
            font-size: 16px;
            text-decoration: none;
        }

        /* ── Container ── */
        .container { padding: 0 0 16px; }
        .section { padding: 0 20px; margin-bottom: 28px; }
        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 14px;
            letter-spacing: -0.3px;
        }

        /* ── Cards ── */
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            overflow: hidden;
            margin-bottom: 10px;
        }
        .card-padded { padding: 16px; }

        /* ── Podcast cover card ── */
        .cover-card {
            position: relative;
            border-radius: var(--radius-lg);
            overflow: hidden;
            background: var(--surface2);
            flex-shrink: 0;
        }
        .cover-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .cover-card-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 40px 12px 12px;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
        }
        .cover-card-title {
            font-size: 13px;
            font-weight: 700;
            color: white;
            line-height: 1.2;
        }
        .cover-card-sub {
            font-size: 11px;
            color: rgba(255,255,255,0.6);
            margin-top: 2px;
        }

        /* ── Horizontal scroll ── */
        .hscroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 0 20px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .hscroll::-webkit-scrollbar { display: none; }

        /* ── List items ── */
        .list-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.1s;
            gap: 12px;
        }
        .list-item:last-child { border-bottom: none; }
        .list-item:active { background: var(--surface2); }
        .list-item.selected { background: rgba(123,94,167,0.15); }
        .list-item.playing { background: rgba(0,194,178,0.1); }

        .list-thumb {
            width: 52px;
            height: 52px;
            border-radius: 10px;
            background: var(--surface3);
            flex-shrink: 0;
            overflow: hidden;
        }
        .list-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .list-thumb-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            background: var(--surface3);
        }

        .list-info { flex: 1; min-width: 0; }
        .list-title {
            font-size: 15px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text);
        }
        .list-sub {
            font-size: 12px;
            color: var(--text2);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .list-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        /* ── Buttons ── */
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            border-radius: var(--radius);
            font-size: 16px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            margin-bottom: 10px;
            transition: opacity 0.15s, transform 0.1s;
            -webkit-appearance: none;
        }
        .btn:active { opacity: 0.7; transform: scale(0.98); }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: var(--surface2); color: var(--text); }
        .btn-danger { background: var(--error); color: white; }
        .btn-ghost { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
        .btn-small {
            padding: 7px 14px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 20px;
            width: auto;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin: 0;
        }

        /* ── Input ── */
        .input-group {
            background: var(--surface2);
            border-radius: var(--radius);
            overflow: hidden;
            margin-bottom: 12px;
        }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: none;
            border-bottom: 1px solid var(--border);
            background: transparent;
            font-size: 16px;
            color: var(--text);
            outline: none;
        }
        .input-group input:last-child { border-bottom: none; }
        .input-group input::placeholder { color: var(--muted); }

        /* ── Alerts ── */
        .alert {
            padding: 12px 16px;
            border-radius: var(--radius);
            margin-bottom: 12px;
            font-size: 14px;
            font-weight: 500;
        }
        .alert-error { background: rgba(255,69,58,0.15); color: #ff6b6b; }
        .alert-success { background: rgba(48,209,88,0.15); color: #30d158; }

        /* ── Status box ── */
        .status-box {
            padding: 16px;
            border-radius: var(--radius);
            background: var(--surface2);
            font-size: 14px;
            line-height: 1.6;
        }
        .status-running { background: rgba(123,94,167,0.15); }
        .status-done { background: rgba(48,209,88,0.12); }
        .status-error { background: rgba(255,69,58,0.12); }

        /* ── Badge ── */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 3px 9px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
        }
        .badge-purple { background: rgba(123,94,167,0.25); color: var(--accent2); }
        .badge-green { background: rgba(48,209,88,0.2); color: #30d158; }
        .badge-gray { background: var(--surface3); color: var(--muted); }

        /* ── Spinner ── */
        .spinner {
            display: inline-block;
            width: 16px; height: 16px;
            border: 2px solid var(--surface3);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Empty state ── */
        .empty {
            text-align: center;
            padding: 40px 20px;
            color: var(--muted);
        }
        .empty-icon { font-size: 44px; margin-bottom: 12px; }
        .empty strong { display: block; color: var(--text2); font-size: 16px; margin-bottom: 6px; }
        .empty p { font-size: 14px; }

        /* ── Section label ── */
        .section-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            padding: 0 20px;
            margin: 20px 0 8px;
        }

        /* ── Feed URL ── */
        .feed-url {
            font-family: "SF Mono", monospace;
            font-size: 12px;
            background: var(--surface2);
            padding: 12px 16px;
            border-radius: 10px;
            word-break: break-all;
            color: var(--cyan);
            margin-bottom: 12px;
        }

        /* ── Mini spelare ── */
        .mini-player {
            position: fixed;
            bottom: calc(var(--nav-height) + var(--safe-bottom));
            left: 12px; right: 12px;
            background: rgba(36,36,36,0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 10px 14px;
            display: none;
            align-items: center;
            gap: 10px;
            z-index: 200;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        .mini-player.visible { display: flex; }
        .mini-thumb {
            width: 42px; height: 42px;
            border-radius: 8px;
            background: var(--surface3);
            flex-shrink: 0;
            overflow: hidden;
        }
        .mini-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .mini-info { flex: 1; min-width: 0; }
        .mini-title {
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .mini-progress {
            height: 2px;
            background: var(--surface3);
            border-radius: 1px;
            margin-top: 4px;
            overflow: hidden;
        }
        .mini-progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 1px;
            width: 0%;
        }
        .mini-controls {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .mini-btn {
            background: none;
            border: none;
            color: var(--text);
            font-size: 20px;
            cursor: pointer;
            padding: 6px;
            display: flex;
            align-items: center;
        }
        .mini-play-btn {
            width: 36px; height: 36px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: white;
        }

        /* ── Bottom navigation ── */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: calc(var(--nav-height) + var(--safe-bottom));
            padding-bottom: var(--safe-bottom);
            background: rgba(18,18,18,0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: flex-start;
            padding-top: 10px;
            z-index: 100;
        }
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            text-decoration: none;
            border: none;
            background: none;
            padding: 0;
        }
        .nav-icon {
            width: 28px; height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: var(--muted);
            transition: color 0.2s;
        }
        .nav-label {
            font-size: 10px;
            font-weight: 500;
            color: var(--muted);
            transition: color 0.2s;
        }
        .nav-item.active .nav-icon,
        .nav-item.active .nav-label {
            color: var(--accent);
        }

        /* ── Tab pages ── */
        .tab-page { display: none; }
        .tab-page.active { display: block; }

        /* ── Expanded player ── */
        .player-sheet {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 300;
            display: none;
            flex-direction: column;
            padding: 0 24px;
            padding-top: calc(60px + env(safe-area-inset-top, 0px));
            padding-bottom: calc(40px + var(--safe-bottom));
        }
        .player-sheet.open { display: flex; }
        .player-sheet-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
        }
        .player-sheet-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .player-close {
            background: var(--surface2);
            border: none;
            width: 32px; height: 32px;
            border-radius: 50%;
            color: var(--text);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .player-cover {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 20px;
            background: var(--surface2);
            overflow: hidden;
            margin-bottom: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }
        .player-cover img { width: 100%; height: 100%; object-fit: cover; }
        .player-cover-placeholder {
            width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
        }
        .player-meta { margin-bottom: 24px; }
        .player-ep-title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.3px;
            margin-bottom: 4px;
        }
        .player-pod-name { font-size: 15px; color: var(--text2); }
        .player-progress-wrap { margin-bottom: 8px; }
        .player-progress-bar {
            height: 4px;
            background: var(--surface3);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }
        .player-progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            width: 0%;
        }
        .player-times {
            display: flex;
            justify-content: space-between;
            margin-top: 6px;
            font-size: 11px;
            color: var(--muted);
        }
        .player-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 24px;
        }
        .player-ctrl-btn {
            background: none;
            border: none;
            color: var(--text2);
            font-size: 28px;
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
        }
        .player-play-btn {
            width: 68px; height: 68px;
            background: var(--text);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
            font-size: 28px;
            color: var(--bg);
        }
        .player-speed {
            background: var(--surface2);
            border: none;
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            color: var(--text);
        }
    </style>
</head>
<body>

{% block content %}{% endblock %}

<!-- Mini-spelare -->
<div class="mini-player" id="miniPlayer" onclick="openPlayer()">
    <div class="mini-thumb" id="miniThumb">
        <div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:20px">🎙</div>
    </div>
    <div class="mini-info">
        <div class="mini-title" id="miniTitle">Inget spelas</div>
        <div class="mini-progress"><div class="mini-progress-fill" id="miniProgressFill"></div></div>
    </div>
    <div class="mini-controls" onclick="event.stopPropagation()">
        <button class="mini-btn" onclick="skipBack()">↺</button>
        <button class="mini-play-btn" id="miniPlayBtn" onclick="togglePlay()">▶</button>
        <button class="mini-btn" onclick="skipForward()">↻</button>
    </div>
</div>

<!-- Utökad spelare -->
<div class="player-sheet" id="playerSheet">
    <div class="player-sheet-header">
        <span class="player-sheet-title">Spelar nu</span>
        <button class="player-close" onclick="closePlayer()">✕</button>
    </div>
    <div class="player-cover" id="playerCover">
        <div class="player-cover-placeholder">🎙</div>
    </div>
    <div class="player-meta">
        <div class="player-ep-title" id="playerEpTitle">Inget spelas</div>
        <div class="player-pod-name" id="playerPodName"></div>
    </div>
    <div class="player-progress-wrap">
        <div class="player-progress-bar" id="playerProgressBar" onclick="seekTo(event)">
            <div class="player-progress-fill" id="playerProgressFill"></div>
        </div>
        <div class="player-times">
            <span id="playerCurrentTime">0:00</span>
            <span id="playerTotalTime">0:00</span>
        </div>
    </div>
    <div class="player-controls">
        <button class="player-speed" id="playerSpeedBtn" onclick="cycleSpeed()">1×</button>
        <button class="player-ctrl-btn" onclick="skipBack()">↺<span style="font-size:10px;vertical-align:super">15</span></button>
        <button class="player-play-btn" id="playerPlayBtn" onclick="togglePlay()">▶</button>
        <button class="player-ctrl-btn" onclick="skipForward()">↻<span style="font-size:10px;vertical-align:super">30</span></button>
        <div style="width:44px"></div>
    </div>
</div>

<!-- Bottom navigation -->
<nav class="bottom-nav">
    {% if session.username %}
    <button class="nav-item active" id="nav-hem" onclick="switchTab('hem')">
        <div class="nav-icon">⌂</div>
        <span class="nav-label">Hem</span>
    </button>
    <button class="nav-item" id="nav-lyssna" onclick="switchTab('lyssna')">
        <div class="nav-icon">▶</div>
        <span class="nav-label">Lyssna</span>
    </button>
    <button class="nav-item" id="nav-bibliotek" onclick="switchTab('bibliotek')">
        <div class="nav-icon">☰</div>
        <span class="nav-label">Bibliotek</span>
    </button>
    <button class="nav-item" id="nav-sok" onclick="switchTab('sok')">
        <div class="nav-icon">⌕</div>
        <span class="nav-label">Sök</span>
    </button>
    {% endif %}
</nav>

<audio id="audioEl" preload="metadata"></audio>

<script>
// PWA
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/sw.js');
}

// ── Spelare ──
const audio = document.getElementById('audioEl');
const speeds = [1, 1.25, 1.5, 1.75, 2];
let speedIdx = 0;
let currentTrack = null;

function playEpisode(url, title, podName, thumbUrl) {
    audio.src = url;
    currentTrack = { url, title, podName, thumbUrl };
    updatePlayerUI();
    document.getElementById('miniPlayer').classList.add('visible');
    audio.play();
    updatePlayBtn(true);
}

function updatePlayerUI() {
    if (!currentTrack) return;
    document.getElementById('miniTitle').textContent = currentTrack.title;
    document.getElementById('playerEpTitle').textContent = currentTrack.title;
    document.getElementById('playerPodName').textContent = currentTrack.podName || '';
    if (currentTrack.thumbUrl) {
        document.getElementById('miniThumb').innerHTML = `<img src="${currentTrack.thumbUrl}" onerror="this.parentNode.innerHTML='<div style=width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:20px>🎙</div>'">`;
        document.getElementById('playerCover').innerHTML = `<img src="${currentTrack.thumbUrl}" onerror="this.parentNode.innerHTML='<div class=player-cover-placeholder>🎙</div>'">`;
    }
}

function togglePlay() {
    if (audio.paused) { audio.play(); updatePlayBtn(true); }
    else { audio.pause(); updatePlayBtn(false); }
}

function updatePlayBtn(playing) {
    const icon = playing ? '⏸' : '▶';
    document.getElementById('miniPlayBtn').textContent = icon;
    document.getElementById('playerPlayBtn').textContent = icon;
}

function skipBack() { audio.currentTime = Math.max(0, audio.currentTime - 15); }
function skipForward() { audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 30); }

function cycleSpeed() {
    speedIdx = (speedIdx + 1) % speeds.length;
    audio.playbackRate = speeds[speedIdx];
    document.getElementById('playerSpeedBtn').textContent = speeds[speedIdx] + '×';
}

function seekTo(e) {
    const bar = document.getElementById('playerProgressBar');
    const pct = e.offsetX / bar.offsetWidth;
    audio.currentTime = pct * (audio.duration || 0);
}

function formatTime(s) {
    if (!s || isNaN(s)) return '0:00';
    const m = Math.floor(s / 60), sec = Math.floor(s % 60);
    return `${m}:${sec.toString().padStart(2,'0')}`;
}

audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    const pct = (audio.currentTime / audio.duration) * 100;
    const fill = pct + '%';
    document.getElementById('miniProgressFill').style.width = fill;
    document.getElementById('playerProgressFill').style.width = fill;
    document.getElementById('playerCurrentTime').textContent = formatTime(audio.currentTime);
});
audio.addEventListener('loadedmetadata', () => {
    document.getElementById('playerTotalTime').textContent = formatTime(audio.duration);
});
audio.addEventListener('ended', () => updatePlayBtn(false));

function openPlayer() { document.getElementById('playerSheet').classList.add('open'); }
function closePlayer() { document.getElementById('playerSheet').classList.remove('open'); }

// ── Tab navigation ──
function switchTab(name) {
    document.querySelectorAll('.tab-page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    const page = document.getElementById('page-' + name);
    const nav  = document.getElementById('nav-' + name);
    if (page) page.classList.add('active');
    if (nav)  nav.classList.add('active');
}
</script>
</body>
</html>
