<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>CleanPod</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f2f2f7; color: #1c1c1e; min-height: 100vh; }
        .header { background: #1a1a2e; color: white; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .header h1 { font-size: 20px; font-weight: 700; }
        .header-right { display: flex; gap: 12px; align-items: center; }
        .header a { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 14px; }
        .header a:hover { color: white; }
        .container { max-width: 600px; margin: 0 auto; padding: 16px; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .card h2 { font-size: 17px; font-weight: 600; margin-bottom: 14px; color: #1a1a2e; }
        input, select { width: 100%; padding: 12px; border: 1px solid #e0e0e0; border-radius: 10px; font-size: 16px; margin-bottom: 10px; background: #f9f9f9; }
        input:focus, select:focus { outline: none; border-color: #1a1a2e; background: white; }
        .btn { display: block; width: 100%; padding: 14px; border-radius: 10px; font-size: 16px; font-weight: 600; border: none; cursor: pointer; text-align: center; text-decoration: none; margin-bottom: 8px; }
        .btn-primary { background: #1a1a2e; color: white; }
        .btn-secondary { background: #e0e0e0; color: #333; }
        .btn-danger { background: #ff3b30; color: white; }
        .btn-small { padding: 8px 14px; font-size: 14px; border-radius: 8px; display: inline-block; width: auto; margin: 0; }
        .alert { padding: 12px; border-radius: 10px; margin-bottom: 12px; font-size: 14px; }
        .alert-error { background: #ffeaea; color: #c0392b; }
        .alert-success { background: #eafaf1; color: #1e8449; }
        .status-box { padding: 14px; border-radius: 10px; background: #f2f2f7; font-size: 14px; white-space: pre-wrap; min-height: 60px; }
        .status-running { background: #fff3cd; }
        .status-done { background: #d4edda; }
        .status-error { background: #f8d7da; }
        .episode-item { padding: 12px 0; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
        .episode-item:last-child { border-bottom: none; }
        .episode-item.selected { background: #f0f4ff; margin: 0 -20px; padding: 12px 20px; border-radius: 8px; }
        .episode-title { font-size: 15px; font-weight: 500; }
        .episode-date { font-size: 12px; color: #888; margin-top: 2px; }
        .feed-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
        .feed-item:last-child { border-bottom: none; }
        .feed-name { font-size: 15px; font-weight: 500; }
        .history-item { padding: 10px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
        .history-item:last-child { border-bottom: none; }
        .badge { display: inline-block; background: #1a1a2e; color: white; border-radius: 6px; padding: 2px 8px; font-size: 11px; }
        .badge-green { background: #34c759; }
        .tab-bar { display: flex; background: white; border-radius: 12px; padding: 4px; margin-bottom: 16px; gap: 4px; }
        .tab { flex: 1; padding: 10px; text-align: center; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; color: #888; border: none; background: none; }
        .tab.active { background: #1a1a2e; color: white; }
        .empty { text-align: center; color: #888; padding: 20px; font-size: 14px; }
    </style>
</head>
<body>
<div class="header">
    <h1>🎙️ CleanPod</h1>
    <div class="header-right">
        {% if session.username %}
            <span style="opacity:0.7;font-size:13px">{{ session.username }}</span>
            {% if session.username == 'admin' %}
                <a href="/admin">Admin</a>
            {% endif %}
            <a href="/settings">⚙️</a>
            <a href="/logout">Logga ut</a>
        {% endif %}
    </div>
</div>
<div class="container">
    {% block content %}{% endblock %}
</div>
</body>
</html>
