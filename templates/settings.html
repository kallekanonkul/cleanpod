{% extends "base.html" %}
{% block content %}
<div class="top-header">
    <h1>Inställningar</h1>
    <a href="/" class="icon-btn">✕</a>
</div>

<div class="section-label">NOTISER</div>
<div style="padding:0 12px">
    <div class="card card-padded">
        {% if message %}
        <div class="alert alert-success">{{ message }}</div>
        {% endif %}
        <p style="font-size:14px;color:var(--text2);margin-bottom:12px">
            Ladda ner <strong style="color:var(--text)">Ntfy</strong> på iPhone och prenumerera på ditt ämne för notiser när ett avsnitt är klart.
        </p>
        <div class="input-group" style="margin-bottom:12px">
            <input type="text" id="ntfy" value="{{ ntfy_topic }}" placeholder="t.ex. dittnamn-cleanpod">
        </div>
        <button class="btn btn-primary" onclick="saveSettings()">Spara</button>
    </div>
</div>

<div class="section-label">BYTA LÖSENORD</div>
<div style="padding:0 12px">
    <div class="card card-padded">
        <div class="input-group" style="margin-bottom:12px">
            <input type="password" id="oldpw" placeholder="Nuvarande lösenord">
            <input type="password" id="newpw" placeholder="Nytt lösenord (minst 6 tecken)">
        </div>
        <button class="btn btn-primary" onclick="changePassword()">Byt lösenord</button>
        <div id="pwMsg"></div>
    </div>
</div>

<div style="padding:12px 12px 0">
    <a href="/logout" class="btn btn-danger" style="text-align:center;display:block">Logga ut</a>
</div>

<script>
function saveSettings() {
    const form = document.createElement('form');
    form.method = 'POST'; form.action = '/settings';
    const i = document.createElement('input');
    i.name = 'ntfy_topic'; i.value = document.getElementById('ntfy').value;
    form.appendChild(i); document.body.appendChild(form); form.submit();
}
async function changePassword() {
    const res = await fetch('/api/change_password', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            old_password: document.getElementById('oldpw').value,
            new_password: document.getElementById('newpw').value,
        })
    });
    const data = await res.json();
    document.getElementById('pwMsg').innerHTML = data.ok
        ? '<div class="alert alert-success" style="margin-top:8px">✓ Lösenord bytt!</div>'
        : `<div class="alert alert-error" style="margin-top:8px">${data.error}</div>`;
    if (data.ok) { document.getElementById('oldpw').value = ''; document.getElementById('newpw').value = ''; }
}
</script>
{% endblock %}
