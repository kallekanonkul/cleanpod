{% extends "base.html" %}
{% block content %}
<div style="min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:32px 24px;padding-top:calc(32px + env(safe-area-inset-top,0px))">

    <div style="text-align:center;margin-bottom:40px">
        <div style="width:80px;height:80px;background:var(--accent);border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:40px;margin:0 auto 20px;box-shadow:0 8px 32px rgba(123,94,167,0.4)">🎙</div>
        <h1 style="font-size:28px;font-weight:800">Skapa konto</h1>
        <p style="color:var(--text2);margin-top:6px;font-size:15px">Du behöver en inbjudningskod</p>
    </div>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <div class="input-group" style="margin-bottom:16px">
        <input type="text" id="username" placeholder="Välj användarnamn" autocomplete="username">
        <input type="password" id="password" placeholder="Välj lösenord (minst 6 tecken)" autocomplete="new-password">
        <input type="text" id="code" placeholder="Inbjudningskod" autocomplete="off" style="text-transform:uppercase;letter-spacing:2px">
    </div>

    <button class="btn btn-primary" onclick="doRegister()">Skapa konto</button>
    <a href="/login" class="btn btn-secondary" style="text-align:center;display:block">Tillbaka till inloggning</a>
</div>
<script>
function doRegister() {
    const form = document.createElement('form');
    form.method = 'POST'; form.action = '/register';
    ['username','password','code'].forEach(id => {
        const i = document.createElement('input');
        i.name = id; i.value = document.getElementById(id).value;
        form.appendChild(i);
    });
    document.body.appendChild(form); form.submit();
}
document.addEventListener('keydown', e => { if(e.key==='Enter') doRegister(); });
</script>
{% endblock %}
