{% extends "base.html" %}
{% block content %}
<div style="max-width:380px;margin:48px auto">
    <div style="text-align:center;margin-bottom:32px">
        <div style="width:72px;height:72px;background:#007aff;border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 16px">🎙</div>
        <h1 style="font-size:28px;font-weight:700">Skapa konto</h1>
        <p style="color:#8e8e93;margin-top:6px;font-size:15px">Du behöver en inbjudningskod</p>
    </div>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <div class="input-group" style="margin-bottom:16px">
        <input type="text" id="username" placeholder="Välj användarnamn" autocomplete="username">
        <input type="password" id="password" placeholder="Välj lösenord (minst 6 tecken)" autocomplete="new-password">
        <input type="text" id="code" placeholder="Inbjudningskod" autocomplete="off" style="text-transform:uppercase">
    </div>

    <button class="btn btn-primary" onclick="doRegister()">Skapa konto</button>
    <a href="/login" class="btn btn-secondary">Tillbaka till inloggning</a>
</div>
<script>
async function doRegister() {
    const form = document.createElement('form');
    form.method = 'POST';
    form.action = '/register';
    ['username','password','code'].forEach(id => {
        const i = document.createElement('input');
        i.name = id;
        i.value = document.getElementById(id).value;
        form.appendChild(i);
    });
    document.body.appendChild(form);
    form.submit();
}
document.addEventListener('keydown', e => { if(e.key==='Enter') doRegister(); });
</script>
{% endblock %}
