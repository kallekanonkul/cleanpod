{% extends "base.html" %}
{% block content %}
<div style="min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:32px 24px;padding-top:calc(32px + env(safe-area-inset-top,0px))">

    <div style="text-align:center;margin-bottom:40px">
        <div style="width:80px;height:80px;background:var(--accent);border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:40px;margin:0 auto 20px;box-shadow:0 8px 32px rgba(123,94,167,0.4)">🎙</div>
        <h1 style="font-size:32px;font-weight:800;letter-spacing:-0.5px">CleanPod</h1>
        <p style="color:var(--text2);margin-top:6px;font-size:15px">Reklamfria podcasts</p>
    </div>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <div class="input-group" style="margin-bottom:16px">
        <input type="text" id="username" placeholder="Användarnamn" autocomplete="username" autofocus>
        <input type="password" id="password" placeholder="Lösenord" autocomplete="current-password">
    </div>

    <button class="btn btn-primary" onclick="doLogin()">Logga in</button>
    <a href="/register" class="btn btn-secondary" style="text-align:center;display:block">Registrera med inbjudningskod</a>
</div>
<script>
function doLogin() {
    const form = document.createElement('form');
    form.method = 'POST'; form.action = '/login';
    ['username','password'].forEach(id => {
        const i = document.createElement('input');
        i.name = id; i.value = document.getElementById(id).value;
        form.appendChild(i);
    });
    document.body.appendChild(form); form.submit();
}
document.addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
</script>
{% endblock %}
