{% extends "base.html" %}
{% block content %}
<div style="max-width:380px;margin:48px auto">
    <div style="text-align:center;margin-bottom:32px">
        <div style="width:72px;height:72px;background:#007aff;border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 16px">🎙</div>
        <h1 style="font-size:28px;font-weight:700">CleanPod</h1>
        <p style="color:#8e8e93;margin-top:6px;font-size:15px">Reklamfria podcasts</p>
    </div>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <div class="input-group" style="margin-bottom:16px">
        <input type="text" id="username" placeholder="Användarnamn" autocomplete="username">
        <input type="password" id="password" placeholder="Lösenord" autocomplete="current-password">
    </div>

    <button class="btn btn-primary" onclick="doLogin()">Logga in</button>
    <a href="/register" class="btn btn-secondary">Registrera med inbjudningskod</a>
</div>
<script>
async function doLogin() {
    const form = document.createElement('form');
    form.method = 'POST';
    form.action = '/login';
    ['username','password'].forEach(id => {
        const i = document.createElement('input');
        i.name = id;
        i.value = document.getElementById(id).value;
        form.appendChild(i);
    });
    document.body.appendChild(form);
    form.submit();
}
document.addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
</script>
{% endblock %}
